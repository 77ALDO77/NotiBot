services:
  postgres:
    image: postgres:16-alpine
    container_name: notibot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notibot}
      POSTGRES_USER: ${POSTGRES_USER:-notibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./docs/database/02-dev-seed.sh:/docker-entrypoint-initdb.d/02-dev-seed.sh
      - ./docs/database/02-dev-seed.sql.gz:/docker-entrypoint-initdb.d/02-dev-seed.sql.gz
      - ./.docker-pg-socket:/var/run/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notibot} -d ${POSTGRES_DB:-notibot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - notibot

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notibot-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-notibot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-notibot}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:4200}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - notibot

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-http://localhost:8000}
    container_name: notibot-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - notibot

volumes:
  pgdata:
    name: notibot-pgdata

networks:
  notibot:
    name: notibot
